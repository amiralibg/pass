    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Pass",
        "url": "https://pass.amiralibg.xyz/",
        "applicationCategory": "GameApplication",
        "operatingSystem": "Any",
        "inLanguage": ["en", "fa"],
        "description": "Seven party games for 2–12 friends: Impostor, Spy, Fuse, Hot Seat, Story, Know You, and Likely. Play on one shared phone around the table, or in online rooms where everyone uses their own phone.",
        "featureList": [
          "Impostor — find who doesn't know the secret word",
          "Spy — everyone knows the location except the spy",
          "Fuse — hot-potato prompts on a secret timer",
          "Hot Seat — timed multiple-choice trivia",
          "Story — one line each, read the chaos aloud",
          "Know You — guess a friend's private answers",
          "Likely — Never Have I Ever and Most Likely To",
          "Online rooms — share a link, play on separate phones",
          "English and Persian (Farsi) with RTL support"
        ],
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "image": "https://pass.amiralibg.xyz/og.png"
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&family=Syne:wght@600;700;800&family=Vazirmatn:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      try {
        var prefs = JSON.parse(localStorage.getItem('pass-prefs') || '{}').state || {}
        var theme = prefs.theme === 'light' ? 'light' : 'dark'
        var locale = prefs.locale === 'fa' ? 'fa' : 'en'
        document.documentElement.dataset.theme = theme
        document.documentElement.lang = locale === 'fa' ? 'fa' : 'en'
        document.documentElement.dir = locale === 'fa' ? 'rtl' : 'ltr'
        document.querySelector('meta[name="theme-color"]')?.setAttribute(
          'content',
          theme === 'dark' ? '#0C0D10' : '#E8EAEF',
        )
        document.querySelector('meta[name="color-scheme"]')?.setAttribute('content', theme)
      } catch (e) {}
    </script>
